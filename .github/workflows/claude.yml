name: Claude Code

# The issue -> PR agent.
# Comment "@claude fix this" on an issue (or open an issue whose body contains
# "@claude") and the Claude Code Action reads the issue, edits the code, runs
# the tests, and opens a pull request.

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]

jobs:
  claude:
    # Only run when someone actually mentions @claude, so unrelated issue
    # activity doesn't burn Actions minutes / API tokens.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write          # edit files, push a branch
      pull-requests: write     # open the PR
      issues: write            # comment back on the issue
      id-token: write          # required for the action's auth
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      # Give the runner pixi + the project env, so the agent can run `pixi run test`.
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.63.2      # match the pixi that generated pixi.lock
          run-install: true
          cache: true

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        env:
          # Let the agent use the gh CLI (e.g. `gh pr create`).
          GH_TOKEN: ${{ github.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Don't let claude run forever.
          claude_args: "--max-turns 100"
          # Tool permissions live in .claude/settings.json — the agent reads
          # them from the checkout, same as a human running Claude Code here.
          # trigger_phrase: "@claude"   # default; shown for clarity
